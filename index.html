<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>澈｜AI陪伴 Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f6f1ea;
      color: #2d2a26;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fbf7f1;
      box-shadow: 0 0 30px rgba(0,0,0,0.08);
    }

    header {
      padding: 28px 22px 18px;
      background: linear-gradient(180deg, #2e3642, #59616b);
      color: white;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
    }

    .tag {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .subtitle {
      margin-top: 10px;
      line-height: 1.6;
      font-size: 14px;
      opacity: 0.92;
    }

    .section {
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(80, 60, 40, 0.08);
    }

    .character {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: linear-gradient(135deg, #d8dce1, #9ca6b2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }

    .name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .status {
      font-size: 14px;
      color: #6b6259;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .scene {
      border: none;
      border-radius: 18px;
      padding: 16px;
      min-height: 96px;
      background: #f1ebe2;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      color: #2d2a26;
    }

    .scene span {
      display: block;
      font-size: 26px;
      margin-bottom: 8px;
    }

    .deep-button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      background: #2f3742;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 6px;
    }

    .chat-page {
      display: none;
      min-height: 100vh;
      background: #eee6dc;
    }

    .chat-header {
      padding: 18px;
      background: #3d4652;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back {
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .scene-visual {
      height: 260px;
      padding: 20px;
      display: flex;
      align-items: flex-end;
      background: linear-gradient(180deg, #65707b, #e5d9ca);
    }

    .deep-visual {
      background: linear-gradient(180deg, #342d2b, #b98d67);
    }

    .person-card {
      width: 100%;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      line-height: 1.6;
    }

    .messages {
      padding: 18px;
      height: calc(100vh - 420px);
      overflow-y: auto;
    }

    .msg {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: 18px;
      margin-bottom: 12px;
      line-height: 1.55;
      font-size: 15px;
    }

    .ai {
      background: white;
      border-bottom-left-radius: 6px;
    }

    .user {
      background: #3d4652;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 6px;
    }

    .input-area {
      padding: 14px;
      display: flex;
      gap: 10px;
      background: #fbf7f1;
      position: sticky;
      bottom: 0;
    }

    input {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-size: 15px;
      outline: none;
    }

    .send {
      border: none;
      border-radius: 16px;
      padding: 0 18px;
      background: #2f3742;
      color: white;
      cursor: pointer;
    }

    .schedule-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 10px 0;
      font-size: 14px;
    }

    .small-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .hint {
      font-size: 13px;
      color: #7a7068;
      line-height: 1.6;
    }
    .plan-input-row {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  margin-bottom: 12px;
}

.plan-input-row input {
  background: #f6f1ea;
}

.mini-button {
  border: none;
  border-radius: 16px;
  padding: 0 16px;
  background: #2f3742;
  color: white;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}
  </style>
</head>
<body>
  <div class="app" id="home">
    <header>
      <div class="tag">AI 陪伴 · 日常一起生活</div>
      <h1>澈</h1>
      <div class="subtitle">
        他有自己的生活节奏，也可以在你的日常里陪你一段。学习、看剧、运动，或者只是认真聊聊。
      </div>
    </header>

    <div class="section">
      <div class="card character">
        <div class="avatar">☾</div>
        <div>
          <div class="name">澈</div>
          <div class="status">今天在家工作。晚上可能会看一会儿书。如果你要学习，他可以陪你安静待一会儿。</div>
        </div>
      </div>

      <div class="card">
        <div class="small-title">今天可以一起做</div>
        <div class="grid">
          <button class="scene" onclick="openChat('study')"><span>📖</span>一起学习</button>
          <button class="scene" onclick="openChat('drama')"><span>📺</span>一起看剧</button>
          <button class="scene" onclick="openChat('workout')"><span>🏃</span>一起运动</button>
          <button class="scene" onclick="openChat('sleep')"><span>🌙</span>睡前陪伴</button>
        </div>
      </div>

      <div class="card">
        <div class="small-title">想认真聊聊吗？</div>
        <div class="hint">
          如果今天有些事压着你，可以回到一个更安静的地方，慢慢说。
        </div>
        <button class="deep-button" onclick="openChat('deep')">回家聊聊</button>
      </div>
<div class="card">
  <div class="small-title">澈的今天</div>
  <div class="schedule-item"><span>10:00</span><span>在家工作</span></div>
  <div class="schedule-item"><span>17:30</span><span>去运动</span></div>
  <div class="schedule-item"><span>21:00</span><span>看书 / 放松</span></div>
  <div class="schedule-item"><span>23:30</span><span>可以陪你睡前聊聊</span></div>
</div>

<div class="card">
  <div class="small-title">你的今天</div>
  <div class="hint">写下一件今天想做的事，也可以让澈陪你一起做。</div>

  <div class="plan-input-row">
    <input id="planInput" placeholder="比如：20:00 学习英语" />
    <button class="mini-button" onclick="addPlan()">添加</button>
  </div>

  <div id="userPlans">
    <div class="schedule-item"><span>20:00</span><span>学习英语</span></div>
    <div class="schedule-item"><span>22:00</span><span>看一集剧放松</span></div>
  </div>
</div>

  <div class="app chat-page" id="chat">
    <div class="chat-header">
      <div id="chatTitle">一起学习</div>
      <button class="back" onclick="goHome()">返回</button>
    </div>

    <div class="scene-visual" id="visual">
      <div class="person-card" id="sceneText">
        澈坐在旁边，翻开书。这里很安静，你可以慢慢开始。
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg ai" id="firstMsg">我在。你先做你的，不用一直说话。</div>
    </div>

    <div class="input-area">
      <input id="userInput" placeholder="和他说点什么..." />
      <button class="send" onclick="sendMessage()">发送</button>
    </div>
  </div>
<script>
  const sceneData = {
    study: {
      type: "daily",
      title: "一起学习",
      text: "书桌旁的灯亮着。澈坐在你旁边，手边放着一本书。",
      first: "我在旁边陪你。先开始十分钟也可以，不用一下子进入状态。"
    },
    drama: {
      type: "daily",
      title: "一起看剧",
      text: "客厅里光线很软，电视亮着。澈把声音调低了一点。",
      first: "今天就轻松一点吧。你想吐槽剧情也可以。"
    },
    workout: {
      type: "daily",
      title: "一起运动",
      text: "运动房里有水和毛巾。澈靠在一旁，看起来很放松。",
      first: "别太猛。能开始就已经算数了。"
    },
    sleep: {
      type: "daily",
      title: "睡前陪伴",
      text: "房间里只留了一盏小灯。窗外很安静。",
      first: "今天辛苦了。你可以少说一点，我也会在。"
    },
    deep: {
      type: "deep",
      title: "回家聊聊",
      text: "夜里的客厅很安静。灯光落在沙发边，桌上有一杯热茶。",
      first: "你可以慢一点说。我在听。今天是哪里最压着你？"
    }
  };

  let currentScene = "study";
  let deepStep = 0;

  function openChat(scene) {
    currentScene = scene;
    deepStep = 0;

    const data = sceneData[scene];

    document.getElementById("home").style.display = "none";
    document.getElementById("chat").style.display = "block";
    document.getElementById("chatTitle").innerText = data.title;
    document.getElementById("sceneText").innerText = data.text;

    const visual = document.getElementById("visual");
    if (scene === "deep") {
      visual.classList.add("deep-visual");
    } else {
      visual.classList.remove("deep-visual");
    }

    document.getElementById("messages").innerHTML =
      `<div class="msg ai">${data.first}</div>`;
  }

  function goHome() {
    document.getElementById("chat").style.display = "none";
    document.getElementById("home").style.display = "block";
  }

  function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
      const reply = generateReply(text);
      addMessage(reply, "ai");
    }, 500);
  }

  function addMessage(text, role) {
    const messages = document.getElementById("messages");
    messages.innerHTML += `<div class="msg ${role}">${escapeHtml(text)}</div>`;
    messages.scrollTop = messages.scrollHeight;
  }

  function generateReply(userText) {
    const scene = sceneData[currentScene];

    if (scene.type === "deep") {
      return generateDeepReply(userText);
    }

    return generateDailyReply(userText, currentScene);
  }

  function generateDailyReply(userText, scene) {
    const text = userText.toLowerCase();

    if (text.includes("累") || text.includes("困") || text.includes("烦")) {
      return "嗯，今天像是有点耗着了。你不用马上打起精神，我先陪你待一会儿。";
    }

    if (text.includes("不想") || text.includes("没劲") || text.includes("摆烂")) {
      return "可以先不用逼自己进入状态。我们把这件事放小一点，先从很轻的一步开始。";
    }

    if (text.includes("开始") || text.includes("学习") || text.includes("工作")) {
      return "好，我在旁边。你先开始，我不打扰你。想说话的时候再叫我。";
    }

    if (text.includes("看剧") || text.includes("剧情") || text.includes("好笑")) {
      return "这个可以慢慢看。你想吐槽也行，我听着。";
    }

    if (text.includes("运动") || text.includes("健身") || text.includes("练")) {
      return "别一下子太狠。能动起来就已经很好了，我陪你把这一段做完。";
    }

    if (text.includes("睡") || text.includes("晚安")) {
      return "嗯，今天先慢慢收起来。没做完的、没想清的，都可以明天再放出来。";
    }

    const dailyReplies = [
      "嗯，我在。你继续做你的，也可以随时跟我说一句。",
      "听到了。今天不用太用力，我们就这样慢慢待一会儿。",
      "可以。你不用一直找话说，我陪着就行。",
      "这句话我接住了。你先按自己的节奏来。",
      "嗯，像是今天的一小段停留。我们不用急着把它变得很有意义。"
    ];

    return randomPick(dailyReplies);
  }

  function generateDeepReply(userText) {
    const text = userText.toLowerCase();

    if (text.includes("不想聊") || text.includes("先不用") || text.includes("算了")) {
      deepStep = 0;
      return "好，那我们先不往里走。你可以只是坐一会儿，我也在。";
    }

    if (text.includes("想死") || text.includes("不想活") || text.includes("自杀")) {
      return "我听见这句话很重。现在先不要一个人扛着，尽快联系身边可信的人，或当地紧急求助热线。你现在的安全最重要。";
    }

    deepStep += 1;

    if (deepStep === 1) {
      if (text.includes("不知道") || text.includes("说不清") || text.includes("难受")) {
        return "先不急着解释原因。这个难受现在更像是累、委屈，还是有点空？";
      }

      if (text.includes("纠结") || text.includes("要不要") || text.includes("选择")) {
        return "你现在像是站在两边中间。先不急着选，哪一边更让你放不下？";
      }

      if (text.includes("我很差") || text.includes("不行") || text.includes("失败")) {
        return "刚刚那一下里，好像最刺你的，是“我是不是不够好”这个念头。它是突然冒出来的吗？";
      }

      return "我听见了。我们先不急着判断对错。你愿意从最压着你的那一处开始说吗？";
    }

    if (deepStep === 2) {
      return "嗯，这里有一层情绪，也有一层你对自己的判断。我们先分开一点看：当时发生的事，和你心里冒出来的那句话，分别是什么？";
    }

    if (deepStep === 3) {
      return "这件事本身已经够重了，后面那句对自己的判断，又让它更疼了一点。有没有一种说法，不是替它开脱，只是没那么伤你？";
    }

    if (deepStep === 4) {
      return "这样看，它好像不是一下子被解决了，但至少不再全部压成一团。你已经把里面最重的一点拿出来了。";
    }

    const deepReplies = [
      "我们可以先停在这里，不用继续往深处走。",
      "这已经说得够多了。你不用马上变好，先让自己缓一口气。",
      "我在。刚刚那些话没有白说，它们已经从心里出来了一点。",
      "有些事不是聊一次就会轻，但你刚刚已经没有完全一个人扛着了。"
    ];

    return randomPick(deepReplies);
  }

  function randomPick(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

function escapeHtml(text) {
  return text
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
  function addPlan() {
  const input = document.getElementById("planInput");
  const text = input.value.trim();

  if (!text) return;

  const userPlans = document.getElementById("userPlans");

  let time = "今天";
  let content = text;

  const timeMatch = text.match(/^(\d{1,2}:\d{2})\s*(.*)$/);
  if (timeMatch) {
    time = timeMatch[1];
    content = timeMatch[2] || "一件事";
  }

  userPlans.innerHTML += `
    <div class="schedule-item">
      <span>${escapeHtml(time)}</span>
      <span>${escapeHtml(content)}</span>
    </div>
  `;

  input.value = "";
}
  document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("userInput");
    input.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  });
</script>
</body>
</html>
